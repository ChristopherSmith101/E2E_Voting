<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      text-align: center;
      width: 320px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 22px;
    }

    p {
      color: #555;
      font-size: 14px;
      margin-bottom: 25px;
    }

    .google-btn {
      display: inline-block;
      background: #4285F4;
      color: white;
      padding: 12px 18px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .google-btn:hover {
      background: #3367d6;
    }

    .small {
      margin-top: 15px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Secure Voting System</h1>
    <p>Sign in with your Google account to continue</p>

    <a class="google-btn" href="/auth/start">
      Continue with Google
    </a>

    <div class="small">
      Authentication is handled securely by Google OAuth
    </div>
  </div>

</body>
</html>
