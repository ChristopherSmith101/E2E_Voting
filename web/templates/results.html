<!DOCTYPE html>
<html>
<head>
    <title>Election Results</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
        }
        .header {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .section {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-box.yes {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }
        .stat-box.no {
            background: linear-gradient(135deg, #dc3545 0%, #fd7e14 100%);
        }
        .stat-number {
            font-size: 48px;
            font-weight: bold;
        }
        .stat-label {
            font-size: 18px;
            margin-top: 10px;
        }
        .stat-percentage {
            font-size: 32px;
            margin-top: 10px;
        }
        .winner {
            background: #fff3cd;
            border: 2px solid #ffc107;
            padding: 15px;
            border-radius: 5px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
        }
        .winner.yes {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }
        .winner.no {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }
        .verification-link {
            background: #e7f3ff;
            border: 1px solid #b3d9ff;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
        }
        button {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }
        .error {
            background: #fff5f5;
            border: 1px solid #dc3545;
            color: #dc3545;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 Election Results</h1>
        <p>View the final tally from the election.</p>
    </div>

    <div class="section">
        <button onclick="loadResults()">📊 Load Results</button>
        <button onclick="location.href='/verify'">🔍 Audit Election</button>
        <button onclick="location.href='/'">← Home</button>
    </div>

    <div id="results">
        <div class="loading">Click "Load Results" to display the election outcome.</div>
    </div>

    <script>
        async function loadResults() {
            const resultsDiv = document.getElementById("results");
            resultsDiv.innerHTML = '<div class="loading">Loading election results...</div>';

            try {
                const res = await fetch("/api/ballots/tally");
                const data = await res.json();

                // Determine winner styling
                const winnerClass = data.yes_votes > data.no_votes ? 'yes' : (data.no_votes > data.yes_votes ? 'no' : '');
                const winnerText = data.winner === 'TIE' ? '🤝 ELECTION RESULTED IN A TIE' : `🏆 ${data.winner} WINS`;

                let html = `
                    <div class="section">
                        <h2>Official Election Tally</h2>
                        
                        <p><strong>Total Ballots Cast:</strong> ${data.total_ballots}</p>
                        <p><strong>Valid Ballots:</strong> ${data.valid_ballots}</p>
                        <p><strong>Invalid Ballots:</strong> ${data.invalid_ballots}</p>
                        
                        <div class="stats">
                            <div class="stat-box yes">
                                <div class="stat-label">YES</div>
                                <div class="stat-number">${data.yes_votes}</div>
                                <div class="stat-percentage">${data.yes_percentage.toFixed(1)}%</div>
                            </div>
                            <div class="stat-box no">
                                <div class="stat-label">NO</div>
                                <div class="stat-number">${data.no_votes}</div>
                                <div class="stat-percentage">${data.no_percentage.toFixed(1)}%</div>
                            </div>
                        </div>
                        
                        <div class="winner ${winnerClass}">
                            ${winnerText}
                        </div>
                        
                        <div class="verification-link">
                            <h3>🔍 Verify This Election</h3>
                            <p>This election implements <strong>universal verifiability</strong>. Anyone can verify:</p>
                            <ul>
                                <li>All ballots on the bulletin board have valid proofs</li>
                                <li>The vote count is accurate</li>
                                <li>No ballots were tampered with</li>
                            </ul>
                            <p><a href="/verify" style="color: #007bff; font-weight: bold;">→ Go to Audit Page</a></p>
                        </div>
                    </div>
                `;

                resultsDiv.innerHTML = html;
            } catch (e) {
                resultsDiv.innerHTML = `<div class="error">Error loading results: ${e.message}</div>`;
            }
        }
    </script>
</body>
</html>
