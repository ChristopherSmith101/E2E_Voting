<!DOCTYPE html>
<html>
<head>
    <title>Bulletin Board</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f5f5f5;
        }

        h2 {
            margin-bottom: 10px;
        }

        button {
            padding: 8px 16px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .vote {
            background: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .label {
            font-weight: bold;
        }

        .receipt {
            font-family: monospace;
            color: #333;
        }

        .cipher {
            font-family: monospace;
            font-size: 0.9em;
            color: #555;
            word-wrap: break-word;
        }

        #raw {
            margin-top: 20px;
            background: #222;
            color: #0f0;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }
    </style>
</head>
<body>

    <h2>Public Bulletin Board</h2>

    <button onclick="loadBoard()">Refresh</button>
    <button onclick="toggleRaw()">Toggle Raw JSON</button>

    <div><a href="/">Home Page</a></div>

    <div id="board-container"></div>

    <pre id="raw"></pre>

    <script>
        async function loadBoard() {
            const res = await fetch("/api/board");
            const data = await res.json();

            const container = document.getElementById("board-container");
            container.innerHTML = "";

            data.forEach((vote, index) => {
                const div = document.createElement("div");
                div.className = "vote";

                div.innerHTML = `
                    <div><span class="label">Vote #${index + 1}</span></div>
                    <div><span class="label">Receipt:</span> 
                        <span class="receipt">${vote.receipt}</span>
                    </div>
                    <div><span class="label">Ciphertext:</span></div>
                    <div class="cipher">${JSON.stringify(vote.ciphertext)}</div>
                `;

                container.appendChild(div);
            });

            // also update raw JSON
            document.getElementById("raw").innerText =
                JSON.stringify(data, null, 2);
        }

        function toggleRaw() {
            const raw = document.getElementById("raw");
            raw.style.display = raw.style.display === "none" ? "block" : "none";
        }

        loadBoard();
    </script>

</body>
</html>
